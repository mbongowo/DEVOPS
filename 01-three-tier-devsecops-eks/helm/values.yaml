frontend:
  image:
    repository: three-tier/frontend
    tag: dev
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8080

backend:
  image:
    repository: three-tier/backend
    tag: dev
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000

mongodb:
  enabled: true
  image: mongo:6
  port: 27017
  storage: 1Gi

ingress:
  enabled: true
  className: nginx
  host: todo.example.com
  tls:
    enabled: true
    secretName: todo-tls
    # cert-manager ClusterIssuer that signs the certificate
    clusterIssuer: letsencrypt-prod

serviceMonitor:
  enabled: false
  interval: 15s
