apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-prod
nameSuffix: -prod

resources:
  - ../../base

labels:
  - pairs:
      environment: prod
    includeSelectors: false

# Production keeps the default info log level but disables the experimental
# recommendations feature flag.
patches:
  - target:
      kind: ConfigMap
      name: platform-settings
    patch: |-
      - op: replace
        path: /data/FEATURE_RECOMMENDATIONS
        value: "false"
