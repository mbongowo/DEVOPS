global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: online-boutique
    environment: dev

# Rule files are relative to Prometheus' working directory. The compose service
# sets working_dir to /etc/prometheus so this glob resolves to the mounted
# rules/ directory; promtool resolves it relative to the config's directory.
rule_files:
  - rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Online Boutique microservices (illustrative targets — adjust to your mesh /
  # sidecar metrics endpoints).
  - job_name: online-boutique
    metrics_path: /metrics
    static_configs:
      - targets:
          - "frontend:8080"
          - "checkoutservice:5050"
          - "cartservice:7070"
        labels:
          app: online-boutique
