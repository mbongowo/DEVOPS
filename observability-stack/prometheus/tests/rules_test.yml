# promtool unit tests for the alerting and recording rules.
# Run: promtool test rules prometheus/tests/rules_test.yml
rule_files:
  - ../rules/alerts.yml
  - ../rules/recording.yml

evaluation_interval: 1m

tests:
  # A target that is down for >2m must fire TargetDown.
  - interval: 1m
    input_series:
      - series: 'up{job="frontend", instance="frontend:8080"}'
        values: "0x10"
    alert_rule_test:
      - eval_time: 5m
        alertname: TargetDown
        exp_alerts:
          - exp_labels:
              severity: critical
              job: frontend
              instance: "frontend:8080"
            exp_annotations:
              summary: "Target frontend / frontend:8080 is down"
              description: "frontend:8080 of job frontend has been down for more than 2 minutes."

  # A target that is up must NOT fire TargetDown.
  - interval: 1m
    input_series:
      - series: 'up{job="frontend", instance="frontend:8080"}'
        values: "1x10"
    alert_rule_test:
      - eval_time: 5m
        alertname: TargetDown
        exp_alerts: []

  # 10% 5xx rate must produce a 0.1 recording-rule sample and fire HighErrorRate.
  - interval: 1m
    input_series:
      - series: 'http_requests_total{job="frontend", code="500"}'
        values: "0+10x15"
      - series: 'http_requests_total{job="frontend", code="200"}'
        values: "0+90x15"
    alert_rule_test:
      - eval_time: 12m
        alertname: HighErrorRate
        exp_alerts:
          - exp_labels:
              severity: warning
              job: frontend
            exp_annotations:
              summary: "High 5xx error rate for frontend"
              description: "5xx error ratio is 10% (> 5%) for the last 10 minutes."
