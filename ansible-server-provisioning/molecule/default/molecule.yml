---
dependency:
  name: galaxy
  # Reads the scenario-local requirements.yml (this directory).
driver:
  name: docker
platforms:
  - name: provisioning-instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/roles
  inventory:
    group_vars:
      all:
        # Not testable inside a container — install but don't run the daemon
        # or touch netfilter.
        docker_service_enabled: false
        firewall_manage: false
verifier:
  name: ansible
