---
docker_apt_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
docker_users:
  - "{{ admin_user }}"
# Start/enable the daemon. Disabled under Molecule (no docker-in-docker).
docker_service_enabled: true
