name: Terraform

on:
  push:
    branches: [ main ]
    paths:
      - "terraform-azure-infra/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform-azure-infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform-azure-infra

jobs:
  validate:
    name: fmt, init & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

  plan:
    name: plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    # Only run an Azure-authenticated plan when service-principal secrets are
    # configured. Forks and credential-less runs stop after validate.
    if: >-
      github.event_name == 'push' &&
      vars.AZURE_PLAN_ENABLED == 'true'
    env:
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform plan
        run: terraform plan -input=false -var-file=environments/dev.tfvars
