name: petclinic CI

# Build + test on changes under cicd-pipeline-petclinic/. On a successful push to
# main the image is published to GHCR and a gated `production` deploy job runs.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cicd-pipeline-petclinic/**"
      - ".github/workflows/petclinic.yml"
  pull_request:
    branches: [main]
    paths:
      - "cicd-pipeline-petclinic/**"
      - ".github/workflows/petclinic.yml"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/petclinic

defaults:
  run:
    working-directory: cicd-pipeline-petclinic

jobs:
  build-test:
    name: Build & test (mvnw verify)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B -ntp verify

      - name: Upload boot jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: cicd-pipeline-petclinic/target/*.jar
          if-no-files-found: error
          retention-days: 7

  build-push-image:
    name: Build & push image (GHCR)
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./cicd-pipeline-petclinic
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (production)
    needs: build-push-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Deploy published image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}"
          echo "Deploying ${IMAGE} to production..."
          echo "Replace this step with your real target, e.g.:"
          echo "  az webapp config container set ... --docker-custom-image-name ${IMAGE}"
          echo "  kubectl set image deployment/petclinic petclinic=${IMAGE}"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
