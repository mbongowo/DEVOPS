name: Three-Tier DevSecOps

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "01-three-tier-devsecops-eks/**"
      - ".github/workflows/devsecops-eks.yml"
  pull_request:
    paths:
      - "01-three-tier-devsecops-eks/**"
      - ".github/workflows/devsecops-eks.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: 01-three-tier-devsecops-eks

jobs:
  app:
    name: build + test + image scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend tests
        run: cd backend && npm install && npm test

      - name: Frontend build
        run: cd frontend && npm install && npm run build

      - name: SonarQube quality gate (skipped without SONAR_TOKEN)
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Build images
        run: |
          docker build -t three-tier/backend:ci backend
          docker build -t three-tier/frontend:ci frontend

      - name: Install Trivy
        run: |
          curl -sSLo trivy.tgz https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.tar.gz
          tar -xzf trivy.tgz trivy && sudo mv trivy /usr/local/bin/

      - name: Trivy image scan (fail on fixable CRITICAL)
        run: |
          for img in three-tier/backend:ci three-tier/frontend:ci; do
            echo "::group::trivy $img"
            trivy image --severity CRITICAL --ignore-unfixed --exit-code 1 --no-progress "$img"
            echo "::endgroup::"
          done

  iac:
    name: terraform validate + checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt + validate
        run: |
          cd terraform
          terraform fmt -check
          terraform init -backend=false
          terraform validate
      - name: Checkov (IaC scan, informational)
        run: |
          pipx install checkov || pip install checkov
          checkov -d terraform --soft-fail --quiet --compact

  manifests:
    name: helm lint + kubeconform
    runs-on: ubuntu-latest
    env:
      DATREE: 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/
      - name: helm lint
        run: helm lint helm
      - name: Render + kubeconform (core)
        run: |
          helm template t helm --set serviceMonitor.enabled=false \
            | kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.31.0 -summary -
      - name: Validate Argo CD CRDs
        run: |
          kubeconform -strict -schema-location default -schema-location "$DATREE" \
            argocd/project.yaml argocd/application.yaml
