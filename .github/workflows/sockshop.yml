name: Sock Shop GitOps

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "03-sockshop-gitops/**"
      - ".github/workflows/sockshop.yml"
  pull_request:
    paths:
      - "03-sockshop-gitops/**"
      - ".github/workflows/sockshop.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: 03-sockshop-gitops

jobs:
  validate:
    name: kustomize + kubeconform
    runs-on: ubuntu-latest
    env:
      DATREE: 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize (if absent) + kubeconform
        run: |
          if ! command -v kustomize >/dev/null; then
            curl -sSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
            sudo mv kustomize /usr/local/bin/
          fi
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/

      - name: Validate overlays (core resources)
        run: |
          for env in dev prod; do
            echo "::group::$env"
            kustomize build apps/overlays/$env \
              | kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.31.0 -summary -
            echo "::endgroup::"
          done

      - name: Validate Argo CD + Rollouts CRDs
        run: |
          kubeconform -strict -schema-location default -schema-location "$DATREE" \
            argocd/project.yaml argocd/applicationset.yaml \
            apps/base/front-end.yaml apps/base/analysis-template.yaml
