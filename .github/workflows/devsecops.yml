name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "04-devsecops-cicd-pipeline/**"
      - ".github/workflows/devsecops.yml"
  pull_request:
    paths:
      - "04-devsecops-cicd-pipeline/**"
      - ".github/workflows/devsecops.yml"

permissions:
  contents: read

env:
  TRIVY_VERSION: "0.71.2"

defaults:
  run:
    working-directory: 04-devsecops-cicd-pipeline

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          curl -sSLo g.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf g.tgz gitleaks && sudo mv gitleaks /usr/local/bin/
      - name: gitleaks (whole repo, fail on leak)
        run: |
          gitleaks detect --no-git --source "$GITHUB_WORKSPACE" \
            --config .gitleaks.toml --report-path gitleaks-report.json --redact --exit-code 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: 04-devsecops-cicd-pipeline/gitleaks-report.json

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Semgrep (fail on findings)
        run: |
          pip install --quiet semgrep
          semgrep scan --config p/default --error --json --output semgrep-report.json app/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: 04-devsecops-cicd-pipeline/semgrep-report.json
      - name: SonarQube (skipped without SONAR_TOKEN)
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  vuln:
    name: Dependency + image scan (Trivy)
    runs-on: ubuntu-latest
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sSLo trivy.tgz https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          tar -xzf trivy.tgz trivy && sudo mv trivy /usr/local/bin/
      - name: Build image
        run: docker build -t devsecops-demo:ci app
      - name: Trivy filesystem scan (deps/secrets/misconfig)
        run: |
          trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL \
            --format json -o fs-report.json --exit-code 1 --no-progress app
      - name: Trivy image scan (fail on fixable CRITICAL)
        run: |
          trivy image --severity CRITICAL --ignore-unfixed \
            --format json -o image-report.json --exit-code 1 --no-progress devsecops-demo:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            04-devsecops-cicd-pipeline/fs-report.json
            04-devsecops-cicd-pipeline/image-report.json
      - name: OWASP Dependency-Check (runs with NVD_API_KEY)
        if: env.NVD_API_KEY != ''
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: devsecops-demo
          path: app
          format: HTML
          args: --failOnCVSS 7 --nvdApiKey ${{ env.NVD_API_KEY }}

  iac:
    name: IaC scan (Trivy config + Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sSLo trivy.tgz https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          tar -xzf trivy.tgz trivy && sudo mv trivy /usr/local/bin/
      - name: Trivy config (fail on HIGH/CRITICAL)
        run: |
          trivy config --severity HIGH,CRITICAL --format json -o iac-report.json \
            --exit-code 1 terraform
      - name: Checkov (informational report)
        run: |
          pip install --quiet checkov
          checkov -d terraform --compact --soft-fail
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac-report
          path: 04-devsecops-cicd-pipeline/iac-report.json
