name: GitOps

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "gitops-argocd/**"
      - ".github/workflows/gitops.yml"
  pull_request:
    paths:
      - "gitops-argocd/**"
      - ".github/workflows/gitops.yml"

permissions:
  contents: read

env:
  KUBE_VERSION: "1.30.0"
  KUBECONFORM_VERSION: "0.6.7"
  DATREE_SCHEMA: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"

defaults:
  run:
    working-directory: gitops-argocd

jobs:
  validate:
    name: kustomize build + kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure kustomize is available
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
              | bash -s 5.4.3 /usr/local/bin
          fi
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSLo kc.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kc.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate kustomize overlays
        run: |
          for overlay in manifests/platform-config/overlays/*/; do
            echo "::group::$overlay"
            kustomize build "$overlay" \
              | kubeconform -strict -summary -kubernetes-version "$KUBE_VERSION" -
            echo "::endgroup::"
          done

      - name: Validate Argo CD manifests (CRD schemas)
        run: |
          kubeconform -strict -summary -verbose \
            -kubernetes-version "$KUBE_VERSION" \
            -schema-location default \
            -schema-location "$DATREE_SCHEMA" \
            bootstrap projects apps appsets
