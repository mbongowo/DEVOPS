# The front-end is delivered as an Argo Rollout with a canary strategy so new
# versions are shifted in gradually and automatically rolled back if the
# success-rate analysis fails.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: front-end
  labels:
    app: front-end
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
    spec:
      containers:
        - name: front-end
          image: weaveworksdemos/front-end:0.3.12
          ports:
            - containerPort: 8079
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 300m
              memory: 300Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8079
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8079
            initialDelaySeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service
                value: front-end
        - setWeight: 50
        - pause:
            duration: 30s
        - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: front-end
  labels:
    app: front-end
spec:
  type: ClusterIP
  selector:
    app: front-end
  ports:
    - name: http
      port: 80
      targetPort: 8079
