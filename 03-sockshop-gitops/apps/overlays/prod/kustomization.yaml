apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sock-shop-prod

resources:
  - ../../base

labels:
  - pairs:
      environment: prod
    includeSelectors: false

# Prod: two replicas of stateless services and the front-end rollout.
patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Rollout
      name: front-end
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
