global:
  resolve_timeout: 5m
  # The webhook URL is injected from a secret/env at deploy time — never commit it.
  slack_api_url_file: /etc/alertmanager/secrets/slack-url

route:
  receiver: slack-default
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: slack-critical
      continue: false

receivers:
  - name: slack-default
    slack_configs:
      - channel: "#robotshop-alerts"
        send_resolved: true
        title: '{{ .CommonLabels.alertname }} — {{ .CommonLabels.service }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

  - name: slack-critical
    slack_configs:
      - channel: "#robotshop-pager"
        send_resolved: true
        title: '🔥 {{ .CommonLabels.alertname }} — {{ .CommonLabels.service }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

# Don't page on warnings for a service that already has a critical firing.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["service"]
