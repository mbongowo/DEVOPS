---
- name: Set the system timezone
  community.general.timezone:
    name: "{{ system_timezone }}"

- name: Ensure chrony is installed
  ansible.builtin.dnf:
    name: chrony
    state: present

- name: Ensure chrony is running and enabled
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true

- name: Create the application service account
  ansible.builtin.user:
    name: "{{ app_user }}"
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Harden the SSH daemon
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/90-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin no
      X11Forwarding no
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd
